services:
  steamapp-server:
    image: steamapp-server:local
    build:
      context: ./SteamApp.Server
      dockerfile: SteamApp.WebAPI/Dockerfile
    env_file:
      - ./env/server.env
    ports:
      - "5136:8080"
    depends_on:
      - steamapp-sql
    restart: unless-stopped

  steamapp-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
      - ./env/sqlserver.env
    ports:
      - "14333:1433"
    volumes:
      - steamapp-sql-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  steamapp-sql-data:
