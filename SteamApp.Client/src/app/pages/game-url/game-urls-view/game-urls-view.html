<div class="p-4">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-2xl font-semibold text-gray-500">Game URLs</h2>

    <div class="flex gap-x-2">
      <button
        (click)="refreshButtonClicked()"
        class="button button-small-secondary"
        title="Reload current data">
        Refresh
      </button>

      <button
        (click)="exportButtonClicked()"
        class="button button-small-primary"
        title="Export current data to Excel">
        Export
      </button>

      <button class="create-button" (click)="createButtonClicked()">Create</button>
    </div>
  </div>

  <div class="filter-toolbar">
    <div class="filter-group">
      <label>Game</label>
      <select class="px-2 py-1" [formControl]="gameIdControl">
        <option [ngValue]="null">All</option>
        @for (g of games(); track g.id) {
          <option [ngValue]="g.id">{{ g.name }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label>Name</label>
      <input
        class="px-2 py-1"
        type="text"
        placeholder="Filter by name"
        [formControl]="searchByNameFilterControl"
        (input)="onNameFilterChanged($any($event.target).value)">
    </div>

    <button (click)="clearFiltersButtonClicked()" class="button button-small-danger">Clear</button>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="dataSource" matSort class="app-data-table">
      <ng-container matColumnDef="gameName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Game</th>
        <td mat-cell *matCellDef="let row">
          {{ row.gameName }}
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let row">
          {{ row.name || '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="partialUrl">
        <th mat-header-cell *matHeaderCellDef>URL</th>
        <td mat-cell *matCellDef="let row">
          <a [href]="row.partialUrl" [title]="row.partialUrl" target="_blank" rel="noopener noreferrer">
            <p><b>&lt;-- Link --&gt;</b></p>
          </a>
        </td>
      </ng-container>

      <ng-container matColumnDef="isBatchUrl">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Batch</th>
        <td mat-cell *matCellDef="let row">
          <input type="checkbox" [checked]="row.isBatchUrl" disabled />
        </td>
      </ng-container>

      <ng-container matColumnDef="startPage">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Start</th>
        <td mat-cell *matCellDef="let row">
          {{ row.startPage ?? '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="endPage">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>End</th>
        <td mat-cell *matCellDef="let row">
          {{ row.endPage ?? '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="isPublicApi">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Public API</th>
        <td mat-cell *matCellDef="let row">
          <input type="checkbox" [checked]="row.isPublicApi" disabled />
        </td>
      </ng-container>

      <ng-container matColumnDef="isPixelScrape">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Pixel</th>
        <td mat-cell *matCellDef="let row">
          <input type="checkbox" [checked]="row.isPixelScrape" disabled />
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <div class="table-actions-cell">
            <button
              type="button"
              mat-icon-button
              class="table-actions-trigger"
              [matMenuTriggerFor]="gameUrlActionsMenu"
              [disabled]="isDeleting(row.id)"
              [class.busy-cursor]="isDeleting(row.id)"
              aria-label="Open game URL actions">
              <mat-icon>more_horiz</mat-icon>
            </button>

            <mat-menu #gameUrlActionsMenu="matMenu" xPosition="before" panelClass="table-actions-menu">
              <button type="button" mat-menu-item (click)="editButtonClicked(row.id)" [disabled]="isDeleting(row.id)">
                <span>Edit</span>
              </button>

              <button
                type="button"
                mat-menu-item
                class="table-actions-menu__danger"
                (click)="deleteButtonClicked(row.id)"
                [disabled]="isDeleting(row.id)">
                <span>Delete</span>
              </button>
            </mat-menu>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator showFirstLastButtons></mat-paginator>
  </div>
</div>
