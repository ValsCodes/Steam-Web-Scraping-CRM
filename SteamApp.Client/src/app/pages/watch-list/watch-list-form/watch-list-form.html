<form [formGroup]="form" (ngSubmit)="onSubmit()" class="general-form app-form">
  <div class="app-form__header">
    <span class="app-form__eyebrow">Monitoring</span>
    <h2 class="app-form__title">{{ isEditMode ? 'Edit Watch List Item' : 'Create Watch List Item' }}</h2>
    <p class="app-form__description">
      Save a custom URL, name, and active state for pages you want to monitor outside the main catalog.
    </p>
  </div>

  <div class="app-form__grid">
    <div class="form-group form-group--full">
      <label for="watch-list-url">URL *</label>
      <input
        id="watch-list-url"
        name="url"
        type="text"
        formControlName="url"
        class="px-2 py-1 w-full"
        placeholder="https://example.com" />
    </div>

    <div class="form-group">
      <label for="watch-list-name">Name *</label>
      <input
        id="watch-list-name"
        name="name"
        type="text"
        formControlName="name"
        class="px-2 py-1 w-full"
        placeholder="Name" />
    </div>

    <div class="form-group">
      <label for="watch-list-registration-date">Registration Date</label>
      <input
        id="watch-list-registration-date"
        name="registrationDate"
        type="date"
        formControlName="registrationDate"
        class="px-2 py-1 w-full" />
    </div>

    <div class="form-group checkbox-group">
      <label>
        <input id="watch-list-is-active" name="isActive" type="checkbox" formControlName="isActive" />
        Active
      </label>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" [disabled]="form.invalid || isSubmitting" [class.busy-cursor]="isSubmitting">
      {{ isSubmitting ? (isEditMode ? 'Saving...' : 'Creating...') : (isEditMode ? 'Save changes' : 'Create watch item') }}
    </button>

    <button type="button" class="form-back-button" (click)="cancel()">Back</button>
  </div>
</form>
