<div class="p-4">
  <div class="flex items-center justify-between">
    <h2 class="text-2xl font-semibold text-gray-500">Custom Watch List</h2>

    <div class="flex gap-x-2">
      <button
        (click)="refreshButtonClicked()"
        class="button button-small-secondary"
        [disabled]="isGridLoading"
        [class.busy-cursor]="isGridLoading"
        title="Reload current data">
        {{ isGridLoading ? 'Loading...' : 'Refresh' }}
      </button>

      <button
        (click)="exportButtonClicked()"
        class="button button-small-primary"
        [disabled]="isGridLoading"
        title="Export current data to Excel">
        Export
      </button>

      <button class="create-button" (click)="createButtonClicked()">
        Create
      </button>
    </div>
  </div>

  <div class="filter-toolbar">
    <div class="filter-group">
      <label>Name</label>
      <input
        class="px-2 py-1"
        type="text"
        placeholder="Filter by name"
        [formControl]="searchByNameControl" />
    </div>

    <button class="button button-small-danger" (click)="clearFiltersButtonClicked()">
      Clear
    </button>

    <div class="filter-toolbar__spacer" aria-hidden="true"></div>

    <div class="filter-group filter-group--page-size">
      <label>Items per page</label>
      <select
        class="px-2 py-1"
        [value]="pageSize"
        [disabled]="isGridLoading"
        (change)="pageSizeChanged($any($event.target).value)">
        @for (size of pageSizeOptions; track size) {
          <option [value]="size">{{ size }}</option>
        }
      </select>
    </div>
  </div>

  <div
    class="table-container table-container--with-loading"
    [class.table-container--loading]="isGridLoading"
    [attr.aria-busy]="isGridLoading">
    @if (isGridLoading) {
      <div class="grid-loading-overlay" role="status" aria-live="polite">
        <div class="grid-loading-card">
          <span class="grid-loading-spinner" aria-hidden="true"></span>
          <span>Loading watch list...</span>
        </div>
      </div>
    }

    <table mat-table [dataSource]="dataSource" matSort class="app-data-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let row">{{ row.name ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="url">
        <th mat-header-cell *matHeaderCellDef>URL</th>
        <td mat-cell *matCellDef="let row">
          <a [href]="row.url" [title]="row.url" target="_blank" rel="noopener noreferrer">
            <p><b>&lt;-- Link --&gt;</b></p>
          </a>
        </td>
      </ng-container>

      <ng-container matColumnDef="registrationDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Registered</th>
        <td mat-cell *matCellDef="let row">{{ row.registrationDate }}</td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Active</th>
        <td mat-cell *matCellDef="let row">
          <input type="checkbox" [checked]="row.isActive" disabled />
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <div class="table-actions-cell">
            <button
              type="button"
              mat-icon-button
              class="table-actions-trigger"
              [matMenuTriggerFor]="watchListActionsMenu"
              [disabled]="isDeleting(row.id) || isStatusUpdating(row.id)"
              [class.busy-cursor]="isDeleting(row.id) || isStatusUpdating(row.id)"
              aria-label="Open watch list actions">
              <mat-icon>more_horiz</mat-icon>
            </button>

            <mat-menu #watchListActionsMenu="matMenu" xPosition="before" panelClass="table-actions-menu">
              <button
                type="button"
                mat-menu-item
                (click)="activeButtonClicked(row)"
                [disabled]="isDeleting(row.id) || isStatusUpdating(row.id)">
                <span>{{ row.isActive ? 'Deactivate' : 'Activate' }}</span>
              </button>

              <button
                type="button"
                mat-menu-item
                (click)="editButtonClicked(row.id)"
                [disabled]="isDeleting(row.id) || isStatusUpdating(row.id)">
                <span>Edit</span>
              </button>

              <button
                type="button"
                mat-menu-item
                class="table-actions-menu__danger"
                (click)="deleteButtonClicked(row.id)"
                [disabled]="isDeleting(row.id) || isStatusUpdating(row.id)">
                <span>Delete</span>
              </button>
            </mat-menu>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      showFirstLastButtons
      [disabled]="isGridLoading"
      [hidePageSize]="true"
      [pageSize]="pageSize"></mat-paginator>
  </div>
</div>
