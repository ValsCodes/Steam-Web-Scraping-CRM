<div class="p-4">
  <div class="flex flex-col">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-2xl font-semibold text-gray-500">Games</h2>

      <div class="flex gap-x-2">
        <button
          (click)="refreshButtonClicked()"
          class="button button-small-secondary"
          [disabled]="isGridLoading"
          [class.busy-cursor]="isGridLoading"
          title="Reload current data">
          {{ isGridLoading ? 'Loading...' : 'Refresh' }}
        </button>

        <button
          (click)="exportButtonClicked()"
          class="button button-small-primary"
          [disabled]="isGridLoading"
          title="Export current data to Excel">
          Export
        </button>

        <button class="create-button" (click)="createButtonClicked()">
          Create
        </button>
      </div>
    </div>

    <div class="filter-toolbar">
      <div class="filter-group">
        <label for="games-filter-name">Name</label>
        <input
          id="games-filter-name"
          name="gamesFilterName"
          class="px-2 py-1"
          type="text"
          placeholder="Filter by name"
          [formControl]="searchByName"
          (input)="onNameFilterChanged($any($event.target).value)" />
      </div>

      <button class="button button-small-danger" (click)="clearFilters()">
        Clear
      </button>

      <div class="filter-toolbar__spacer" aria-hidden="true"></div>

      <div class="filter-group filter-group--page-size">
        <label for="games-page-size">Items per page</label>
        <select
          id="games-page-size"
          name="gamesPageSize"
          class="px-2 py-1"
          [value]="pageSize"
          [disabled]="isGridLoading"
          (change)="pageSizeChanged($any($event.target).value)">
          @for (size of pageSizeOptions; track size) {
            <option [value]="size">{{ size }}</option>
          }
        </select>
      </div>
    </div>
  </div>

  <div
    class="table-container table-container--with-loading"
    [class.table-container--loading]="isGridLoading"
    [attr.aria-busy]="isGridLoading">
    @if (isGridLoading) {
      <div class="grid-loading-overlay" role="status" aria-live="polite">
        <div class="grid-loading-card">
          <span class="grid-loading-spinner" aria-hidden="true"></span>
          <span>Loading games...</span>
        </div>
      </div>
    }

    <table mat-table [dataSource]="dataSource" matSort class="app-data-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let game">
          @if (game.pageUrl) {
            <a
              [href]="game.pageUrl"
              [title]="game.pageUrl"
              target="_blank"
              rel="noopener noreferrer">
              {{ game.name }}
            </a>
          } @else {
            {{ game.name }}
          }
        </td>
      </ng-container>

      <ng-container matColumnDef="internalId">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Internal ID</th>
        <td mat-cell *matCellDef="let game">
          {{ game.internalId }}
        </td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Active</th>
        <td mat-cell *matCellDef="let game">
          <input
            [attr.id]="'game-active-' + game.id"
            name="gameActiveStatus"
            type="checkbox"
            [checked]="game.isActive"
            [attr.aria-label]="'Game active status for ' + (game.name || game.id)"
            disabled />
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let game">
          <div class="table-actions-cell">
            <button
              type="button"
              mat-icon-button
              class="table-actions-trigger"
              [matMenuTriggerFor]="gameActionsMenu"
              [disabled]="isDeleting(game.id) || isStatusUpdating(game.id)"
              [class.busy-cursor]="isDeleting(game.id) || isStatusUpdating(game.id)"
              aria-label="Open game actions">
              <mat-icon>more_horiz</mat-icon>
            </button>

            <mat-menu #gameActionsMenu="matMenu" xPosition="before" panelClass="table-actions-menu">
              <button
                type="button"
                mat-menu-item
                (click)="activeButtonClicked(game)"
                [disabled]="isDeleting(game.id) || isStatusUpdating(game.id)">
                <span>{{ game.isActive ? 'Deactivate' : 'Activate' }}</span>
              </button>

              <button
                type="button"
                mat-menu-item
                (click)="editButtonClicked(game.id)"
                [disabled]="isDeleting(game.id) || isStatusUpdating(game.id)">
                <span>Edit</span>
              </button>

              <button
                type="button"
                mat-menu-item
                class="table-actions-menu__danger"
                (click)="deleteButtonClicked(game.id)"
                [disabled]="isDeleting(game.id) || isStatusUpdating(game.id)">
                <span>Delete</span>
              </button>
            </mat-menu>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      showFirstLastButtons
      [disabled]="isGridLoading"
      [hidePageSize]="true"
      [pageSize]="pageSize"></mat-paginator>
  </div>
</div>
