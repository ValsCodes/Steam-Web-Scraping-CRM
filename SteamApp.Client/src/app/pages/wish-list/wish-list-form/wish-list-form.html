<form [formGroup]="form" (ngSubmit)="onSubmit()" class="general-form app-form">
  <div class="app-form__header">
    <span class="app-form__eyebrow">Price Tracking</span>
    <h2 class="app-form__title">{{ isEditMode ? 'Edit Wish List Item' : 'Create Wish List Item' }}</h2>
    <p class="app-form__description">
      Track a target price and activation state for a game you want to monitor.
    </p>
  </div>

  <div class="app-form__grid">
  <div class="form-group">
    <label>Game *</label>
    <select formControlName="gameId" class="px-2 py-1">
      <option value="" disabled>Select a game</option>
      <option *ngFor="let game of games" [value]="game.id">
        {{ game.name }}
      </option>
    </select>
  </div>

  <div class="form-group">
    <label>Name *</label>
    <input formControlName="name" class="px-2 py-1 w-1/2" placeholder="name" />
  </div>

  <div class="form-group">
    <label>Target Price</label>
    <input type="number" formControlName="price" class="px-2 py-1" placeholder="Price (optional)" />
  </div>

  <div class="form-group-row checkbox-group">
    <label>
      <input type="checkbox" formControlName="isActive" />
      Active
    </label>
  </div>

  </div>

  <div class="form-actions">
    <button type="submit" [disabled]="form.invalid || isSubmitting" [class.busy-cursor]="isSubmitting">
      {{ isSubmitting ? (isEditMode ? 'Saving...' : 'Creating...') : (isEditMode ? 'Save changes' : 'Create wish list item') }}
    </button>

    <button type="button" class="form-back-button" (click)="cancel()">
      Back
    </button>
  </div>
</form>
