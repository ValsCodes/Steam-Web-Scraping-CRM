<div class="p-4">
  <div class="flex flex-row items-center justify-between mb-4">
    <h2 class="text-2xl font-semibold text-gray-500">
      Tags
    </h2>

    <div class="flex gap-x-2">
      <button
        (click)="refreshButtonClicked()"
        class="button button-small-secondary"
        [disabled]="isGridLoading"
        [class.busy-cursor]="isGridLoading"
        title="Reload current data">
        {{ isGridLoading ? 'Loading...' : 'Refresh' }}
      </button>

      <button
        (click)="exportButtonClicked()"
        class="button button-small-primary"
        [disabled]="isGridLoading"
        title="Export current data to Excel">
        Export
      </button>

      <button class="create-button" (click)="createButtonClicked()">Create</button>
    </div>
  </div>

  <div class="filter-toolbar">
    <div class="filter-group">
      <label for="tags-filter-game">Game</label>
      <select id="tags-filter-game" name="tagsFilterGame" class="px-2 py-1" [formControl]="gameIdControl">
        <option [ngValue]="null">All</option>
        @for (g of games$ | async; track g.id) {
        <option [ngValue]="g.id">{{ g.name }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label for="tags-filter-name">Name</label>
      <input id="tags-filter-name" name="tagsFilterName" class="px-2 py-1" type="text" placeholder="Filter by name" [formControl]="searchByNameFilterControl" />
    </div>

    <button (click)="clearFiltersButtonClicked()" class="button button-small-danger">
      Clear
    </button>

    <div class="filter-toolbar__spacer" aria-hidden="true"></div>

    <div class="filter-group filter-group--page-size">
      <label for="tags-page-size">Items per page</label>
      <select
        id="tags-page-size"
        name="tagsPageSize"
        class="px-2 py-1"
        [value]="pageSize"
        [disabled]="isGridLoading"
        (change)="pageSizeChanged($any($event.target).value)">
        @for (size of pageSizeOptions; track size) {
          <option [value]="size">{{ size }}</option>
        }
      </select>
    </div>
  </div>

  <div
    class="table-container table-container--with-loading"
    [class.table-container--loading]="isGridLoading"
    [attr.aria-busy]="isGridLoading">
    @if (isGridLoading) {
      <div class="grid-loading-overlay" role="status" aria-live="polite">
        <div class="grid-loading-card">
          <span class="grid-loading-spinner" aria-hidden="true"></span>
          <span>Loading tags...</span>
        </div>
      </div>
    }

    <table mat-table [dataSource]="dataSource" matSort class="app-data-table">

      <!-- Game -->
      <ng-container matColumnDef="gameName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Game</th>
        <td mat-cell *matCellDef="let row">
          {{ row.gameName || '—' }}
        </td>
      </ng-container>

      <!-- Name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let row">
          {{ row.name || '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Active</th>
        <td mat-cell *matCellDef="let row">
          <input
            [attr.id]="'tag-active-' + row.id"
            name="tagActiveStatus"
            type="checkbox"
            [checked]="row.isActive"
            [attr.aria-label]="'Tag active status for ' + (row.name || row.id)"
            disabled />
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <div class="table-actions-cell">
            <button
              type="button"
              mat-icon-button
              class="table-actions-trigger"
              [matMenuTriggerFor]="tagActionsMenu"
              [disabled]="isDeleting(row.id) || isStatusUpdating(row.id)"
              [class.busy-cursor]="isDeleting(row.id) || isStatusUpdating(row.id)"
              aria-label="Open tag actions">
              <mat-icon>more_horiz</mat-icon>
            </button>

            <mat-menu #tagActionsMenu="matMenu" xPosition="before" panelClass="table-actions-menu">
              <button
                type="button"
                mat-menu-item
                (click)="activeButtonClicked(row)"
                [disabled]="isDeleting(row.id) || isStatusUpdating(row.id)">
                <span>{{ row.isActive ? 'Deactivate' : 'Activate' }}</span>
              </button>

              <button
                type="button"
                mat-menu-item
                (click)="editButtonClicked(row.id)"
                [disabled]="isDeleting(row.id) || isStatusUpdating(row.id)">
                <span>Edit</span>
              </button>

              <button
                type="button"
                mat-menu-item
                class="table-actions-menu__danger"
                (click)="deleteButtonClicked(row.id)"
                [disabled]="isDeleting(row.id) || isStatusUpdating(row.id)">
                <span>Delete</span>
              </button>
            </mat-menu>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      showFirstLastButtons
      [disabled]="isGridLoading"
      [hidePageSize]="true"
      [pageSize]="pageSize"></mat-paginator>
  </div>
</div>
