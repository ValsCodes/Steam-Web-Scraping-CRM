<form [formGroup]="form" (ngSubmit)="onSubmit()" class="general-form app-form">
  <div class="app-form__header">
    <span class="app-form__eyebrow">Pixel Detection</span>
    <h2 class="app-form__title">{{ isEditMode ? 'Edit Pixel' : 'Create Pixel' }}</h2>
    <p class="app-form__description">
      Capture a reusable RGB marker for pixel-based scraping and matching.
    </p>
  </div>

  <div class="app-form__grid">
    <div class="form-group">
      <label for="pixel-game-id">Game *</label>
      <select id="pixel-game-id" name="gameId" formControlName="gameId" class="px-2 py-1">
        <option [ngValue]="null" disabled>Select a game</option>
        @for (game of games(); track game.id) {
          <option [ngValue]="game.id">{{ game.name }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label for="pixel-name">Name *</label>
      <input
        id="pixel-name"
        name="name"
        type="text"
        formControlName="name"
        class="px-2 py-1"
        placeholder="Pixel name" />
    </div>

    <div class="form-group">
      <label for="pixel-red-value">Red (0-255) *</label>
      <input
        id="pixel-red-value"
        name="redValue"
        type="number"
        formControlName="redValue"
        class="px-2 py-1"
        min="0"
        max="255" />
    </div>

    <div class="form-group">
      <label for="pixel-green-value">Green (0-255) *</label>
      <input
        id="pixel-green-value"
        name="greenValue"
        type="number"
        formControlName="greenValue"
        class="px-2 py-1"
        min="0"
        max="255" />
    </div>

    <div class="form-group">
      <label for="pixel-blue-value">Blue (0-255) *</label>
      <input
        id="pixel-blue-value"
        name="blueValue"
        type="number"
        formControlName="blueValue"
        class="px-2 py-1"
        min="0"
        max="255" />
    </div>

    <div class="form-group-row checkbox-group">
      <label>
        <input id="pixel-is-active" name="isActive" type="checkbox" formControlName="isActive" />
        Active
      </label>
    </div>

    <div class="form-group app-form__full">
      <span id="pixel-color-preview-label">Color Preview</span>
      <div
        aria-labelledby="pixel-color-preview-label"
        class="color-preview"
        title="Pixel Color"
        [style.backgroundColor]="'rgb(' +
            form.get('redValue')?.value + ',' +
            form.get('greenValue')?.value + ',' +
            form.get('blueValue')?.value + ')'">
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" [disabled]="form.invalid || isSubmitting" [class.busy-cursor]="isSubmitting">
      {{ isSubmitting ? (isEditMode ? 'Saving...' : 'Creating...') : (isEditMode ? 'Save changes' : 'Create pixel') }}
    </button>

    <button type="button" class="form-back-button" (click)="cancel()">
      Back
    </button>
  </div>
</form>
