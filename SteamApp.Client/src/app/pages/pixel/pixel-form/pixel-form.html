<form [formGroup]="form" (ngSubmit)="onSubmit()" class="general-form app-form">
  <div class="app-form__header">
    <span class="app-form__eyebrow">Pixel Detection</span>
    <h2 class="app-form__title">{{ isEditMode ? 'Edit Pixel' : 'Create Pixel' }}</h2>
    <p class="app-form__description">
      Capture a reusable RGB marker for pixel-based scraping and matching.
    </p>
  </div>

  <div class="app-form__grid">
    <div class="form-group">
      <label>Game *</label>
      <select formControlName="gameId" class="px-2 py-1">
        <option value="" disabled>Select a game</option>
        <ng-container *ngFor="let game of games">
          <option [value]="game.id">
            {{ game.name }}
          </option>
        </ng-container>
      </select>
    </div>

    <div class="form-group">
      <label>Name *</label>
      <input
        type="text"
        formControlName="name"
        class="px-2 py-1"
        placeholder="Pixel name" />
    </div>

    <div class="form-group">
      <label>Red (0-255) *</label>
      <input
        type="number"
        formControlName="redValue"
        class="px-2 py-1"
        min="0"
        max="255" />
    </div>

    <div class="form-group">
      <label>Green (0-255) *</label>
      <input
        type="number"
        formControlName="greenValue"
        class="px-2 py-1"
        min="0"
        max="255" />
    </div>

    <div class="form-group">
      <label>Blue (0-255) *</label>
      <input
        type="number"
        formControlName="blueValue"
        class="px-2 py-1"
        min="0"
        max="255" />
    </div>

    <div class="form-group-row checkbox-group">
      <label>
        <input type="checkbox" formControlName="isActive" />
        Active
      </label>
    </div>

    <div class="form-group app-form__full">
      <label>Color Preview</label>
      <div
        class="color-preview"
        title="Pixel Color"
        [style.backgroundColor]="'rgb(' +
            form.get('redValue')?.value + ',' +
            form.get('greenValue')?.value + ',' +
            form.get('blueValue')?.value + ')'">
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" [disabled]="form.invalid || isSubmitting" [class.busy-cursor]="isSubmitting">
      {{ isSubmitting ? (isEditMode ? 'Saving...' : 'Creating...') : (isEditMode ? 'Save changes' : 'Create pixel') }}
    </button>

    <button type="button" class="form-back-button" (click)="cancel()">
      Back
    </button>
  </div>
</form>
