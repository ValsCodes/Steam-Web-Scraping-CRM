server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html/browser;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://steamcommunity.com https://*.steamcommunity.com https://steampowered.com https://*.steampowered.com https://steamstatic.com https://*.steamstatic.com https://*.akamaihd.net; connect-src 'self'; form-action 'self'; upgrade-insecure-requests" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
